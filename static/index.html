<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DPDP Assistant</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f6f7f9;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#16202b}
  .wrap{max-width:740px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#fff;
        border-left:1px solid #eceef1;border-right:1px solid #eceef1}
  header{background:#11243d;color:#fff;padding:16px 22px}
  header h1{margin:0;font-size:17px}
  header p{margin:3px 0 0;font-size:12.5px;opacity:.75}
  header .stat{font-size:11px;opacity:.7;margin-top:6px}
  .thread{flex:1;overflow-y:auto;padding:20px 22px}
  .m{margin-bottom:16px;display:flex}.m.u{justify-content:flex-end}
  .b{padding:11px 15px;border-radius:14px;max-width:84%;font-size:15px;line-height:1.55;white-space:pre-wrap}
  .u .b{background:#1f6feb;color:#fff;border-bottom-right-radius:4px}
  .a .b{background:#f1f3f6;border:1px solid #e6e8eb;border-bottom-left-radius:4px}
  .src{font-size:11.5px;color:#6b7280;margin-top:6px}.src b{color:#11243d}
  .warn{font-size:11.5px;color:#9a6b00;margin-top:4px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 22px 8px}
  .chip{border:1px solid #d7dbe0;background:#fff;border-radius:999px;padding:7px 13px;font-size:12.5px;cursor:pointer}
  .chip:hover{border-color:#1f6feb}
  .foot{display:flex;gap:9px;padding:14px 22px;border-top:1px solid #eceef1}
  input{flex:1;border:1px solid #d7dbe0;border-radius:11px;padding:12px 14px;font-size:15px}
  input:focus{outline:none;border-color:#1f6feb}
  .send{border:0;background:#11243d;color:#fff;border-radius:11px;padding:0 20px;font-weight:600;cursor:pointer}
  .send:disabled{opacity:.5}
  .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#9aa1ab;margin-right:3px;animation:b 1s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{opacity:.25}40%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>DPDP Assistant</h1>
    <p>Grounded answers from India's Digital Personal Data Protection Act</p>
    <div class="stat" id="stat">connecting…</div>
  </header>
  <div class="thread" id="thread"></div>
  <div class="chips" id="chips"></div>
  <div class="foot">
    <input id="inp" placeholder="Ask a DPDP question…" autocomplete="off">
    <button class="send" id="send">Send</button>
  </div>
</div>
<script>
const thread=document.getElementById('thread'),inp=document.getElementById('inp'),send=document.getElementById('send');
const CHIPS=["What rights do I have over my personal data?","When must a data breach be reported?",
  "What makes consent valid under the DPDP Act?","What is the penalty for non-compliance?",
  "How is children's data protected?"];
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function bubble(t,who,extra){const m=document.createElement('div');m.className='m '+who;
  m.innerHTML='<div class="b">'+esc(t)+(extra||'')+'</div>';thread.appendChild(m);thread.scrollTop=thread.scrollHeight;return m;}
function typing(){const m=document.createElement('div');m.className='m a';m.id='typing';
  m.innerHTML='<div class="b"><span class="dots"><span></span><span></span><span></span></span></div>';
  thread.appendChild(m);thread.scrollTop=thread.scrollHeight;}
async function ask(){const q=inp.value.trim();if(!q)return;inp.value='';send.disabled=true;
  bubble(q,'u');typing();
  try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q})});
    const d=await r.json();document.getElementById('typing')?.remove();
    let extra='';
    if(d.sources&&d.sources.length){const p=[...new Set(d.sources.map(s=>s.page))].join(', ');
      extra='<div class="src"><b>Source:</b> DPDP document, page '+esc(String(p))+'</div>';}
    if(d.ollama_ok===false)extra+='<div class="warn">⚠ Local model offline — start Ollama to get generated answers.</div>';
    bubble(d.answer,'a',extra);
  }catch(e){document.getElementById('typing')?.remove();bubble('Could not reach the server.','a');}
  send.disabled=false;inp.focus();}
function chips(){const el=document.getElementById('chips');CHIPS.forEach(q=>{const c=document.createElement('button');
  c.className='chip';c.textContent=q;c.onclick=()=>{inp.value=q;ask();};el.appendChild(c);});}
async function health(){try{const r=await fetch('/api/health');const h=await r.json();
  document.getElementById('stat').textContent=`${h.chunks} chunks indexed · model ${h.model} · vector store ${h.vector_store}`;
  }catch(e){document.getElementById('stat').textContent='offline';}}
send.onclick=ask;inp.addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
chips();health();bubble("Hi! Ask me anything about India's DPDP Act — consent, rights, breaches, penalties, children's data. Pick a suggestion below or type your question.","a");
</script>
</body>
</html>
